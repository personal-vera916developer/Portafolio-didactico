name: 🕒 Close old PRs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: 

jobs:
  close-old-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Close PRs older than 7 days
        run: npm test |
          gh pr list --state open --json url,headRefName --jq '.[] | {url, headRefName}' | jq -c '.' | while read pr; do
            url=$(echo "$pr" | jq -r '.url')
            branch=$(echo "$pr" | jq -r '.headRefName')
            gh pr close "$url" --comment "Los tests fallaron, por lo que este PR se cerrará automáticamente." --delete-branch "$branch"
          done
        
